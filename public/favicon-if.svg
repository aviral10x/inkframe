<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark circle background -->
  <circle cx="16" cy="16" r="16" fill="#0d1117"/>
  <!-- IF monogram — serif style matching the logo -->
  <!-- I bar (vertical stroke of I) -->
  <rect x="8.5" y="9" width="2.2" height="14" fill="#f0ece4"/>
  <!-- F vertical stroke -->
  <rect x="13.5" y="9" width="2" height="14" fill="#f0ece4"/>
  <!-- F top horizontal bar -->
  <rect x="13.5" y="9" width="7.5" height="2" fill="#f0ece4"/>
  <!-- F middle horizontal bar -->
  <rect x="13.5" y="15" width="5.5" height="2" fill="#f0ece4"/>
  <!-- Serif serifs on I -->
  <rect x="7" y="9" width="5.2" height="1.4" fill="#f0ece4"/>
  <rect x="7" y="21.6" width="5.2" height="1.4" fill="#f0ece4"/>
  <!-- Serif serifs on F vertical -->
  <rect x="12.2" y="9" width="3" height="1.4" fill="#f0ece4"/>
  <rect x="12.2" y="21.6" width="3" height="1.4" fill="#f0ece4"/>
</svg>